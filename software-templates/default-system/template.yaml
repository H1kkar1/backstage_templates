apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: default-system
  title: Default System Service
  description: Basic service template
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Service Configuration
      required:
        - componentId
        - owner
        - namespace
      properties:
        componentId:
          title: Service Name
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
        owner:
          title: Owner Team
          type: string
        namespace:
          title: Kubernetes Namespace
          type: string
          default: "default"
        description:
          title: Description
          type: string
        port:
          title: Application Port
          type: number
          default: 8080

    - title: Git Configuration
      properties:
        codeRepoUrl:
          title: Code Repository URL
          type: string
          default: "github.com?owner=H1KKAR1&repo="
        gitopsRepoUrl:
          title: GitOps Repository URL
          type: string
          default: "github.com?owner=H1KKAR1&repo=Diplom"

  steps:
    - id: generate-code
      name: Generate Application Code
      action: fetch:template
      input:
        url: https://github.com/H1KKAR1/backstage_templates/tree/master/software-templates/default-system/skeleton-code
        targetPath: ./generated-code
        values:
          componentId: ${{ parameters.componentId }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}

    - id: create-code-repo
      name: Create Code Repository
      action: publish:github
      input:
        repoUrl: ${{ parameters.codeRepoUrl }}${{ parameters.componentId }}
        defaultBranch: main
        repoVisibility: private
        description: ${{ parameters.description }}
        sourcePath: ./generated-code

    - id: generate-manifests
      name: Generate Kubernetes Manifests
      action: fetch:template
      input:
        url: https://github.com/H1KKAR1/backstage_templates/tree/master/software-templates/default-system/skeleton-flux
        targetPath: ./generated/apps/${{ parameters.owner }}/${{ parameters.componentId }}
        values:
          componentId: ${{ parameters.componentId }}
          namespace: ${{ parameters.namespace }}
          port: ${{ parameters.port }}
          owner: ${{ parameters.owner }}

    - id: push-to-gitops
      name: Push to GitOps Repository
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.gitopsRepoUrl }}
        title: "Add ${{ parameters.componentId }} service"
        description: "This PR adds Kubernetes manifests for ${{ parameters.componentId }}"
        branchName: backstage/add-${{ parameters.componentId }}
        sourcePath: ./generated
        targetPath: .
        update: true

    - id: register-component
      name: Register Component in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['create-code-repo'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Code Repository
        url: ${{ steps['create-code-repo'].output.remoteUrl }}
      - title: GitOps Manifests
        url: ${{ parameters.gitopsRepoUrl }}/tree/main/apps/${{ parameters.owner }}/${{ parameters.componentId }}