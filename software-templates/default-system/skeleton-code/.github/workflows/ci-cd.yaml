{% raw %}
name: Default Service CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  GITOPS_REPO: ${{ secrets.GITOPS_REPO_URL }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}:latest

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Get service name
        id: service
        run: echo "name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT
      
      - name: Clone GitOps repository
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
        run: |
          git clone https://x-access-token:${GITOPS_PAT}@${GITOPS_REPO#https://} gitops
      
      - name: Update deployment image
        run: |
          cd gitops
          sed -i "s|image:.*|image: ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}|" apps/${{ steps.service.outputs.name }}/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update ${{ steps.service.outputs.name }} to ${{ github.sha }}"
          git push origin main
{% endraw %}