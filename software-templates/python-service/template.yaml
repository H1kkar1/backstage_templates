apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: python-service
  title: Python Service
  description: Deploys Python service with GitOps
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Service Configuration
      required:
        - componentId
        - owner
        - namespace
      properties:
        componentId:
          title: Service Name
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
        owner:
          title: Owner Team
          type: string
        namespace:
          title: Kubernetes Namespace
          type: string
          default: "default"
        description:
          title: Description
          type: string
        port:
          title: Application Port
          type: number
          default: 8000

    - title: Git Configuration
      properties:
        codeRepoUrl:
          title: Code Repository URL
          type: string
          default: "github.com?owner=your-org&repo="
        gitopsRepoUrl:
          title: GitOps Repository URL
          type: string
          default: "https://github.com/H1KKAR1/Diplom"

    - title: Ingress Configuration
      properties:
        exposeService:
          title: Expose via Ingress?
          type: boolean
          default: false
        hostname:
          title: Domain Name
          type: string
          ui:show:
            condition: exposeService == true

  steps:
    # ШАГ 1: Создаем репозиторий с кодом пользователя
    - id: generate-manifests
      name: Generate Kubernetes Manifests
      action: fetch:template
      input:
        url: https://github.com/H1KKAR1/backstage_templates/tree/master/software-templates/python-service/skeleton-flux
        targetPath: ./generated/apps/${{ parameters.owner }}/${{ parameters.componentId }}
        values:
          componentId: ${{ parameters.componentId }}
          namespace: ${{ parameters.namespace }}
          port: ${{ parameters.port }}
          owner: ${{ parameters.owner }}
          exposeService: ${{ parameters.exposeService }}
          hostname: ${{ parameters.hostname }}

    # ШАГ 2: Генерируем Flux манифесты
    - id: generate-manifests
      name: Generate Kubernetes Manifests
      action: fetch:template
      input:
        url: ./skeleton-flux
        targetPath: ./generated/apps/${{ parameters.owner }}/${{ parameters.componentId }}
        values:
          componentId: ${{ parameters.componentId }}
          namespace: ${{ parameters.namespace }}
          port: ${{ parameters.port }}
          owner: ${{ parameters.owner }}
          exposeService: ${{ parameters.exposeService }}
          hostname: ${{ parameters.hostname }}

    # ШАГ 3: Пушим манифесты в GitOps репозиторий
    - id: push-to-gitops
      name: Push to GitOps Repository
      action: github:repo:push
      input:
        repoUrl: ${{ parameters.gitopsRepoUrl }}
        branch: main
        commitMessage: "Add ${{ parameters.componentId }} service for ${{ parameters.owner }} team"
        sourcePath: ./generated
        skipClone: true

    # ШАГ 4: Регистрируем компонент в Backstage
    - id: register-component
      name: Register Component in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['create-code-repo'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Code Repository
        url: ${{ steps['create-code-repo'].output.remoteUrl }}
      - title: GitOps Manifests
        url: ${{ parameters.gitopsRepoUrl }}/tree/main/apps/${{ parameters.owner }}/${{ parameters.componentId }}