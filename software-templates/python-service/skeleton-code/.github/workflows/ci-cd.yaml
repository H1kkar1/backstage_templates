name: Python Service CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.11"
  GITOPS_REPO: ${{ secrets.GITOPS_REPO_URL }}

jobs:
  # JOB 1: Линтинг и тесты
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black
      
      - name: Lint with flake8
        run: flake8 . --count --max-complexity=10 --statistics
      
      - name: Format with black
        run: black --check .
      
      - name: Test with pytest
        run: pytest --cov=. --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  # JOB 2: Безопасность
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # JOB 3: Сборка и пуш образа
  build-and-push:
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha,prefix={{date 'YYYYMMDD'}}-{{sha}}
            type=raw,value=latest
            type=ref,event=branch
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        id: image
        run: |
          echo "tag=${{ steps.meta.outputs.tags }}" >> $GITHUB_OUTPUT
          echo "digest=${{ steps.meta.outputs.digest }}" >> $GITHUB_OUTPUT

  # JOB 4: Обновление GitOps репозитория
  update-gitops:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Get service name
        id: service
        run: echo "name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT
      
      - name: Clone GitOps repository
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
        run: |
          git clone https://x-access-token:${GITOPS_PAT}@${GITOPS_REPO#https://} gitops
      
      - name: Update deployment image
        run: |
          cd gitops
          SERVICE_NAME="${{ steps.service.outputs.name }}"
          IMAGE_TAG="${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}"
          
          # Обновляем image в deployment
          sed -i "s|image:.*|image: ${IMAGE_TAG}|" apps/${SERVICE_NAME}/deployment.yaml
          
          # Обновляем checksum annotation для rolling update
          sed -i "/annotations:/a\    checksum/config: $(date +%s)" apps/${SERVICE_NAME}/deployment.yaml
      
      - name: Commit and push changes
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/${{ steps.service.outputs.name }}/deployment.yaml
          git commit -m "Update ${{ steps.service.outputs.name }} to ${{ github.sha }}
          
          Image: ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}
          Triggered by: ${{ github.actor }}
          Commit: ${{ github.sha }}"
          git push origin main