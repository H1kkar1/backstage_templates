apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${{ values.componentId }}
  namespace: flux-system
  labels:
    app: ${{ values.componentId }}
    team: ${{ values.owner }}
spec:
  interval: 5m
  path: ./apps/${{ values.owner }}/${{ values.componentId }}
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: ${{ values.componentId }}
      namespace: ${{ values.namespace }}