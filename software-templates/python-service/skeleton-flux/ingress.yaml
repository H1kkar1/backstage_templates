{% if parameters.exposeService %}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ parameters.componentId }}
  namespace: ${{ parameters.namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
  - host: ${{ parameters.hostname }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ${{ parameters.componentId }}
            port:
              number: 8080
  {% if parameters.tlsEnabled %}
  tls:
  - hosts:
    - ${{ parameters.hostname }}
    secretName: ${{ parameters.componentId }}-tls
  {% endif %}
{% endif %}