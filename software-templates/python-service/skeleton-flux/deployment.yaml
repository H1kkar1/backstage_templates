apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.componentId }}
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.componentId }}
    team: ${{ values.owner }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.componentId }}
  template:
    metadata:
      labels:
        app: ${{ values.componentId }}
        team: ${{ values.owner }}
    spec:
      containers:
      - name: app
        image: ghcr.io/your-org/${{ values.componentId }}:latest
        ports:
        - containerPort: ${{ values.port }}
        env:
        - name: NAMESPACE
          value: ${{ values.namespace }}
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"