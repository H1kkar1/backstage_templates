apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ parameters.componentId }}
  namespace: ${{ parameters.namespace }}
  labels:
    app: ${{ parameters.componentId }}
    backstage.io/name: ${{ parameters.componentId }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ parameters.componentId }}
  template:
    metadata:
      labels:
        app: ${{ parameters.componentId }}
    spec:
      containers:
      - name: app
        image: ghcr.io/your-org/${{ parameters.componentId }}:latest
        ports:
        - containerPort: ${{ parameters.port }}
        env:
        - name: NAMESPACE
          value: ${{ parameters.namespace }}
        - name: SERVICE_NAME
          value: ${{ parameters.componentId }}
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"