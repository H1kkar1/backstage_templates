# Создается только если нужно создавать новый namespace
${{ if parameters.createResources and not parameters.skipCreation }}
apiVersion: v1
kind: Namespace
metadata:
  name: ${{ parameters.name }}
  labels:
    name: ${{ parameters.name }}
    managed-by: flux
    created-by: backstage
    team: ${{ parameters.team | default('platform') }}
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ${{ parameters.name }}-quota
  namespace: ${{ parameters.name }}
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    persistentvolumeclaims: "10"
    pods: "50"
    services: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ${{ parameters.name }}-limits
  namespace: ${{ parameters.name }}
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 200m
        memory: 256Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 50m
        memory: 64Mi
${{ end }}