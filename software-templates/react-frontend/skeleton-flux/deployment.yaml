apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.componentId }}
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.componentId }}
    backstage.io/name: ${{ values.componentId }}
spec:
  replicas: ${{ values.replicaCount }}
  selector:
    matchLabels:
      app: ${{ values.componentId }}
  template:
    metadata:
      labels:
        app: ${{ values.componentId }}
    spec:
      containers:
      - name: app
        image: ${{ values.imageRegistry }}/${{ values.imageOrg }}/${{ values.componentId }}:latest
        ports:
        - containerPort: ${{ values.port }}
        env:
        - name: NAMESPACE
          value: ${{ values.namespace }}
        - name: SERVICE_NAME
          value: ${{ values.componentId }}
        resources:
          requests:
            memory: ${{ values.memoryRequest }}
            cpu: ${{ values.cpuRequest }}
          limits:
            memory: ${{ values.memoryLimit }}
            cpu: ${{ values.cpuLimit }}
        livenessProbe:
          httpGet:
            path: /
            port: ${{ values.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: ${{ values.port }}
          initialDelaySeconds: 5
          periodSeconds: 5