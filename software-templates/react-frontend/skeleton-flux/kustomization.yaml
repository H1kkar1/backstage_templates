apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${{ parameters.componentId }}
  namespace: flux-system
  labels:
    app: ${{ parameters.componentId }}
    team: ${{ parameters.owner }}
spec:
  interval: 5m
  path: ./apps/${{ parameters.owner }}/${{ parameters.componentId }}
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: ${{ parameters.componentId }}
      namespace: ${{ parameters.namespace }}