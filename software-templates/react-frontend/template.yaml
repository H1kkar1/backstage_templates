apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: react-frontend
  title: React Frontend Application
  description: Deploys React frontend with GitOps
spec:
  owner: platform-team
  type: frontend

  parameters:
    - title: Service Configuration
      required:
        - componentId
        - owner
        - namespace
      properties:
        componentId:
          title: Service Name
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
        owner:
          title: Owner Team
          type: string
        namespace:
          title: Kubernetes Namespace
          type: string
          default: "frontend"
        description:
          title: Description
          type: string
        port:
          title: Application Port
          type: number
          default: 80
        replicaCount:
          title: Number of Replicas
          type: number
          default: 2
        memoryRequest:
          title: Memory Request
          type: string
          default: "64Mi"
        cpuRequest:
          title: CPU Request
          type: string
          default: "50m"
        memoryLimit:
          title: Memory Limit
          type: string
          default: "256Mi"
        cpuLimit:
          title: CPU Limit
          type: string
          default: "200m"

    - title: Container Registry Configuration
      properties:
        imageRegistry:
          title: Container Registry
          type: string
          default: "ghcr.io"
        imageOrg:
          title: Registry Organization
          type: string
          default: "H1KKAR1"

    - title: Git Configuration
      properties:
        codeRepoUrl:
          title: Code Repository URL
          type: string
          default: "github.com?owner=H1KKAR1&repo="
        gitopsRepoUrl:
          title: GitOps Repository URL
          type: string
          default: "github.com?owner=H1KKAR1&repo=Diplom"

    - title: Ingress Configuration
      properties:
        exposeService:
          title: Expose via Ingress?
          type: boolean
          default: true
        hostname:
          title: Domain Name
          type: string
          ui:show:
            condition: exposeService == true
        ingressClass:
          title: Ingress Class
          type: string
          default: "nginx"
          ui:show:
            condition: exposeService == true
        tlsEnabled:
          title: Enable TLS
          type: boolean
          default: true
          ui:show:
            condition: exposeService == true

  steps:
    - id: generate-code
      name: Generate Application Code
      action: fetch:template
      input:
        url: https://github.com/H1KKAR1/backstage_templates/tree/master/software-templates/react-frontend/skeleton-code
        targetPath: ./generated-code
        values:
          componentId: ${{ parameters.componentId }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}

    - id: create-code-repo
      name: Create Frontend Code Repository
      action: publish:github
      input:
        repoUrl: ${{ parameters.codeRepoUrl }}${{ parameters.componentId }}
        defaultBranch: main
        repoVisibility: private
        description: ${{ parameters.description }}
        sourcePath: ./generated-code

    - id: generate-manifests
      name: Generate Kubernetes Manifests
      action: fetch:template
      input:
        url: https://github.com/H1KKAR1/backstage_templates/tree/master/software-templates/react-frontend/skeleton-flux
        targetPath: ./generated/apps/${{ parameters.owner }}/${{ parameters.componentId }}
        values:
          componentId: ${{ parameters.componentId }}
          namespace: ${{ parameters.namespace }}
          port: ${{ parameters.port }}
          owner: ${{ parameters.owner }}
          exposeService: ${{ parameters.exposeService }}
          hostname: ${{ parameters.hostname }}
          ingressClass: ${{ parameters.ingressClass }}
          tlsEnabled: ${{ parameters.tlsEnabled }}
          replicaCount: ${{ parameters.replicaCount }}
          memoryRequest: ${{ parameters.memoryRequest }}
          cpuRequest: ${{ parameters.cpuRequest }}
          memoryLimit: ${{ parameters.memoryLimit }}
          cpuLimit: ${{ parameters.cpuLimit }}
          imageRegistry: ${{ parameters.imageRegistry }}
          imageOrg: ${{ parameters.imageOrg }}

    - id: push-to-gitops
      name: Push to GitOps Repository
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.gitopsRepoUrl }}
        title: "Add ${{ parameters.componentId }} frontend"
        description: |
          This PR adds Kubernetes manifests for ${{ parameters.componentId }} frontend
          
          - Port: ${{ parameters.port }}
          - Replicas: ${{ parameters.replicaCount }}
          - Memory Limit: ${{ parameters.memoryLimit }}
          - CPU Limit: ${{ parameters.cpuLimit }}
        branchName: backstage/add-${{ parameters.componentId }}
        sourcePath: ./generated
        targetPath: .
        update: true

    - id: register-component
      name: Register Component in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['create-code-repo'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Code Repository
        url: ${{ steps['create-code-repo'].output.remoteUrl }}
      - title: GitOps Manifests
        url: ${{ parameters.gitopsRepoUrl }}/tree/main/apps/${{ parameters.owner }}/${{ parameters.componentId }}