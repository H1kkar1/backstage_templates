apiVersion: v1
kind: ConfigMap
metadata:
  name: ${{ parameters.componentId }}-config
  namespace: ${{ parameters.namespace }}
data:
  enabled_plugins: |
    [rabbitmq_management].
  rabbitmq.conf: |
    ## Clustering
    cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config
    cluster_formation.classic_config.nodes.1 = rabbit@localhost
    
    ## Memory & Disk
    vm_memory_high_watermark.absolute = ${{ parameters.memoryLimit | replace('Gi','') }}GB
    disk_free_limit.absolute = 2GB
    
    ## Management
    management.tcp.port = 15672
    management.tcp.ip = 0.0.0.0
    
    ## Default limits
    channel_max = 2047
    heartbeat = 60