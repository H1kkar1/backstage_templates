apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: infra-rabbitmq
  title: RabbitMQ Message Broker
  description: Deploys RabbitMQ message broker
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: RabbitMQ Configuration
      required:
        - componentId
        - namespace
      properties:
        componentId:
          title: Service Name
          type: string
          default: "rabbitmq"
          pattern: '^[a-z][a-z0-9-]*$'
        namespace:
          title: Namespace
          type: string
          default: "message-queue"
        rabbitmqVersion:
          title: RabbitMQ Version
          type: string
          default: "3.12-management-alpine"
          description: "Версия RabbitMQ (например, 3.12-management-alpine, 3.13-management-alpine)"
        defaultUser:
          title: Default Username
          type: string
          default: "admin"
        rabbitmqPassword:
          title: RabbitMQ Password
          type: string
          default: "rabbitmq123"
          ui:field: Secret
        erlangCookie:
          title: Erlang Cookie
          type: string
          default: "cookie123"
          ui:field: Secret
        storageSize:
          title: Storage Size
          type: string
          default: "10Gi"
        memoryLimit:
          title: Memory Limit
          type: string
          default: "1Gi"
        cpuLimit:
          title: CPU Limit
          type: string
          default: "500m"
        memoryRequest:
          title: Memory Request
          type: string
          default: "256Mi"
        cpuRequest:
          title: CPU Request
          type: string
          default: "200m"
        gitopsRepoUrl:
          title: GitOps Repository URL
          type: string
          default: "github.com?owner=H1KKAR1&repo=Diplom"

  steps:
    - id: generate-manifests
      name: Generate RabbitMQ Manifests
      action: fetch:template
      input:
        url: https://github.com/H1KKAR1/backstage_templates/tree/master/infrastructure-templates/rabbitmq/skeleton-flux
        targetPath: ./generated/infrastructure/rabbitmq/${{ parameters.componentId }}
        values:
          componentId: ${{ parameters.componentId }}
          namespace: ${{ parameters.namespace }}
          rabbitmqVersion: ${{ parameters.rabbitmqVersion }}
          defaultUser: ${{ parameters.defaultUser }}
          rabbitmqPassword: ${{ parameters.rabbitmqPassword }}
          erlangCookie: ${{ parameters.erlangCookie }}
          storageSize: ${{ parameters.storageSize }}
          memoryLimit: ${{ parameters.memoryLimit }}
          cpuLimit: ${{ parameters.cpuLimit }}
          memoryRequest: ${{ parameters.memoryRequest }}
          cpuRequest: ${{ parameters.cpuRequest }}

    - id: push-to-gitops
      name: Push to GitOps Repository
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.gitopsRepoUrl }}
        title: "Add RabbitMQ ${{ parameters.componentId }}"
        description: |
          This PR adds RabbitMQ message broker instance
          
          - Version: ${{ parameters.rabbitmqVersion }}
          - Storage: ${{ parameters.storageSize }}
          - Memory Limit: ${{ parameters.memoryLimit }}
          - CPU Limit: ${{ parameters.cpuLimit }}
        branchName: backstage/add-rabbitmq-${{ parameters.componentId }}
        sourcePath: ./generated
        targetPath: .
        update: true

  output:
    links:
      - title: RabbitMQ Manifests
        url: ${{ parameters.gitopsRepoUrl }}/tree/main/infrastructure/rabbitmq/${{ parameters.componentId }}