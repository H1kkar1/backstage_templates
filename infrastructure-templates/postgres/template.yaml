apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: infra-postgres
  title: PostgreSQL Database
  description: Deploys PostgreSQL database without operators
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: PostgreSQL Configuration
      required:
        - componentId
        - namespace
        - databaseName
        - databaseUser
      properties:
        componentId:
          title: Service Name
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
          default: "postgres"
        namespace:
          title: Namespace
          type: string
          default: "databases"
        databaseName:
          title: Database Name
          type: string
          default: "appdb"
        databaseUser:
          title: Database User
          type: string
          default: "appuser"
        postgresVersion:
          title: PostgreSQL Version
          type: string
          enum: ['15', '14', '13']
          default: '15'
        storageSize:
          title: Storage Size
          type: string
          default: "10Gi"
        memoryLimit:
          title: Memory Limit
          type: string
          default: "512Mi"
        cpuLimit:
          title: CPU Limit
          type: string
          default: "500m"
        gitopsRepoUrl:
          title: GitOps Repository URL
          type: string
          default: "https://github.com/your-org/Diplom"

  steps:
    - id: generate-manifests
      name: Generate PostgreSQL Manifests
      action: fetch:template
      input:
        url: ./skeleton-flux
        targetPath: ./generated/infrastructure/postgres/${{ parameters.componentId }}
        values:
          componentId: ${{ parameters.componentId }}
          namespace: ${{ parameters.namespace }}
          databaseName: ${{ parameters.databaseName }}
          databaseUser: ${{ parameters.databaseUser }}
          postgresVersion: ${{ parameters.postgresVersion }}
          storageSize: ${{ parameters.storageSize }}
          memoryLimit: ${{ parameters.memoryLimit }}
          cpuLimit: ${{ parameters.cpuLimit }}

    - id: push-to-gitops
      name: Push to GitOps Repository
      action: github:repo:push
      input:
        repoUrl: ${{ parameters.gitopsRepoUrl }}
        branch: main
        commitMessage: "Add PostgreSQL database ${{ parameters.componentId }}
        
        Database: ${{ parameters.databaseName }}
        User: ${{ parameters.databaseUser }}
        Version: ${{ parameters.postgresVersion }}
        Storage: ${{ parameters.storageSize }}"
        sourcePath: ./generated
        skipClone: true          

  output:
    links:
      - title: PostgreSQL Manifests
        url: ${{ parameters.gitopsRepoUrl }}/tree/main/infrastructure/postgres/${{ parameters.componentId }}
      - title: Connection Info
        text: "Host: ${{ parameters.componentId }}.${{ parameters.namespace }}.svc.cluster.local:5432"