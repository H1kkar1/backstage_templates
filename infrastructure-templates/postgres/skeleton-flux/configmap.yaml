apiVersion: v1
kind: ConfigMap
metadata:
  name: ${{ values.componentId }}-config
  namespace: ${{ values.namespace }}
data:
  POSTGRES_DB: ${{ values.databaseName }}
  POSTGRES_USER: ${{ values.databaseUser }}
  POSTGRES_VERSION: ${{ values.postgresVersion }}
  PGDATA: /var/lib/postgresql/data/pgdata