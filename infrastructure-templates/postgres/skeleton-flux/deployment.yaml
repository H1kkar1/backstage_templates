apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.componentId }}
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.componentId }}
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.componentId }}
  template:
    metadata:
      labels:
        app: ${{ values.componentId }}
        component: database
    spec:
      containers:
      - name: postgres
        image: postgres:${{ values.postgresVersion }}-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: ${{ values.componentId }}-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ${{ values.componentId }}-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: ${{ values.componentId }}-secret
              key: POSTGRES_DB
        - name: PGDATA
          valueFrom:
            configMapKeyRef:
              name: ${{ values.componentId }}-config
              key: PGDATA
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: ${{ values.memoryLimit }}
            cpu: ${{ values.cpuLimit }}
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - ${{ values.databaseUser }}
            - -d
            - ${{ values.databaseName }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - ${{ values.databaseUser }}
            - -d
            - ${{ values.databaseName }}
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: ${{ values.componentId }}-pvc