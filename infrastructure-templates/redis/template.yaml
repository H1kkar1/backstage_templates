steps:
  # ШАГ 1: Клонируем репозиторий с шаблонами
  - id: clone-templates
    name: Clone templates repository
    action: fetch:git
    input:
      url: https://github.com/H1KKAR1/backstage_templates
      branch: master
      targetPath: ./templates

  # ШАГ 2: Генерируем манифесты из локальной папки
  - id: generate-manifests
    name: Generate Redis Manifests
    action: fetch:template
    input:
      url: ./templates/infrastructure-templates/redis/skeleton-flux
      targetPath: ./generated/infrastructure/redis/${{ parameters.componentId }}
      values:
        componentId: ${{ parameters.componentId }}
        namespace: ${{ parameters.namespace }}
        redisVersion: ${{ parameters.redisVersion }}
        maxmemory: ${{ parameters.maxmemory }}
        storageSize: ${{ parameters.storageSize }}
        memoryLimit: ${{ parameters.memoryLimit }}
        cpuLimit: ${{ parameters.cpuLimit }}

  # ШАГ 3: Пушим в GitOps репозиторий
  - id: push-to-gitops
    name: Push to GitOps Repository
    action: publish:github:pull-request
    input:
      repoUrl: ${{ parameters.gitopsRepoUrl }}
      title: "Add Redis ${{ parameters.componentId }}"
      description: "This PR adds Redis cache instance"
      branchName: backstage/add-redis-${{ parameters.componentId }}
      sourcePath: ./generated
      targetPath: .
      update: true