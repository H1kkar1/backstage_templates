apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: infra-redis
  title: Redis Cache
  description: Deploys Redis standalone instance
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: Redis Configuration
      required:
        - componentId
        - namespace
      properties:
        componentId:
          title: Service Name
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
          default: "redis"
        namespace:
          title: Namespace
          type: string
          default: "databases"
        redisVersion:
          title: Redis Version
          type: string
          enum: ['7-alpine', '6-alpine']
          default: '7-alpine'
        maxmemory:
          title: Max Memory
          type: string
          default: "256mb"
        storageSize:
          title: Storage Size
          type: string
          default: "5Gi"
        memoryLimit:
          title: Memory Limit
          type: string
          default: "512Mi"
        cpuLimit:
          title: CPU Limit
          type: string
          default: "200m"
        gitopsRepoUrl:
          title: GitOps Repository URL
          type: string
          default: "github.com?owner=H1KKAR1&repo=Diplom"

  steps:
  - id: clone-templates
    name: Clone templates repository
    action: fetch:git
    input:
      url: https://github.com/H1KKAR1/backstage_templates
      branch: master
      targetPath: ./templates

  - id: copy-manifests
    name: Copy manifests
    action: fetch:template
    input:
      url: ./templates/infrastructure-templates/redis/skeleton-flux
      targetPath: ./generated/infrastructure/redis/${{ parameters.componentId }}

  - id: replace-variables
    name: Replace variables in manifests
    action: debug:exec
    input:
      command: |
        cd ./generated/infrastructure/redis/${{ parameters.componentId }}
        sed -i 's/__COMPONENT_ID__/${{ parameters.componentId }}/g' *.yaml
        sed -i 's/__NAMESPACE__/${{ parameters.namespace }}/g' *.yaml
        sed -i 's/__REDIS_VERSION__/${{ parameters.redisVersion }}/g' deployment.yaml
        sed -i 's/__MAXMEMORY__/${{ parameters.maxmemory }}/g' configmap.yaml
        sed -i 's/__STORAGE_SIZE__/${{ parameters.storageSize }}/g' pvc.yaml
        sed -i 's/__MEMORY_LIMIT__/${{ parameters.memoryLimit }}/g' deployment.yaml
        sed -i 's/__CPU_LIMIT__/${{ parameters.cpuLimit }}/g' deployment.yaml

  output:
    links:
      - title: Redis Manifests
        url: ${{ parameters.gitopsRepoUrl }}/tree/main/infrastructure/redis/${{ parameters.componentId }}