apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.componentId }}
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.componentId }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.componentId }}
  template:
    metadata:
      labels:
        app: ${{ values.componentId }}
    spec:
      containers:
      - name: redis
        image: redis:${{ values.redisVersion }}
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: ${{ values.memoryLimit }}
            cpu: ${{ values.cpuLimit }}
        volumeMounts:
        - name: redis-config
          mountPath: /usr/local/etc/redis
        - name: redis-storage
          mountPath: /data
      volumes:
      - name: redis-config
        configMap:
          name: ${{ values.componentId }}-config
      - name: redis-storage
        persistentVolumeClaim:
          claimName: ${{ values.componentId }}-pvc