apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: diplom-templates
  description: Import templates from backstage_templates
spec:
  targets:
    - https://raw.githubusercontent.com/H1KKAR1/backstage_templates/master/location.yaml
spec:
  targets:
    # Шаблоны приложений
    - ./software-templates/default-system/template.yaml
    - ./software-templates/python-service/template.yaml
    - ./software-templates/react-frontend/template.yaml
    
    # Инфраструктурные шаблоны
    - ./infrastructure-templates/postgres/template.yaml
    - ./infrastructure-templates/redis/template.yaml
    - ./infrastructure-templates/rabbitmq/template.yaml
    - ./infrastructure-templates/monitoring/template.yaml
