apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: infra-redis
  title: Redis Cache
  description: Deploys Redis standalone instance
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: Redis Configuration
      required:
        - componentId
        - namespace
      properties:
        componentId:
          title: Service Name
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
          default: "redis"
        namespace:
          title: Namespace
          type: string
          default: "databases"
        redisVersion:
          title: Redis Version
          type: string
          enum: ['7-alpine', '6-alpine']
          default: '7-alpine'
        maxmemory:
          title: Max Memory
          type: string
          default: "256mb"
        storageSize:
          title: Storage Size
          type: string
          default: "5Gi"
        memoryLimit:
          title: Memory Limit
          type: string
          default: "512Mi"
        cpuLimit:
          title: CPU Limit
          type: string
          default: "200m"
        gitopsRepoUrl:
          title: GitOps Repository URL
          type: string

  steps:
    - id: generate-manifests
      name: Generate Redis Manifests
      action: fetch:template
      input:
        url: ./skeleton-flux
        targetPath: ./generated/infrastructure/redis/${{ parameters.componentId }}
        values:
          componentId: ${{ parameters.componentId }}
          namespace: ${{ parameters.namespace }}
          redisVersion: ${{ parameters.redisVersion }}
          maxmemory: ${{ parameters.maxmemory }}
          storageSize: ${{ parameters.storageSize }}
          memoryLimit: ${{ parameters.memoryLimit }}
          cpuLimit: ${{ parameters.cpuLimit }}

    - id: push-to-gitops
      name: Push to GitOps Repository
      action: github:repo:push
      input:
        repoUrl: ${{ parameters.gitopsRepoUrl }}
        branch: main
        commitMessage: "Add Redis ${{ parameters.componentId }}"
        sourcePath: ./generated
        skipClone: true

  output:
    links:
      - title: Redis Manifests
        url: ${{ parameters.gitopsRepoUrl }}/tree/main/infrastructure/redis/${{ parameters.componentId }}