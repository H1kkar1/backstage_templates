apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: infra-redis
  title: Redis Cache
  description: Deploys Redis standalone instance
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: Redis Configuration
      required:
        - componentId
        - namespace
      properties:
        componentId:
          title: Service Name
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
          default: "redis"
        
        namespace:
          title: Namespace
          type: string
          default: "databases"
        
        redisVersion:
          title: Redis Version
          type: string
          enum: ['7-alpine', '6-alpine']
          default: '7-alpine'
        
        maxmemory:
          title: Max Memory
          type: string
          default: "256mb"
        
        storageSize:
          title: Storage Size
          type: string
          default: "5Gi"
        
        memoryLimit:
          title: Memory Limit
          type: string
          default: "512Mi"
        
        cpuLimit:
          title: CPU Limit
          type: string
          default: "200m"

  steps:
    - id: clone-gitops
      action: fetch:git
      input:
        url: ${{ parameters.gitopsRepoUrl }}
        targetPath: ./gitops

    - id: generate-redis
      action: fetch:template
      input:
        url: ./skeleton-flux
        targetPath: ./gitops/infrastructure/redis/${{ parameters.componentId }}
        values:
          componentId: ${{ parameters.componentId }}
          namespace: ${{ parameters.namespace }}
          redisVersion: ${{ parameters.redisVersion }}
          maxmemory: ${{ parameters.maxmemory }}
          storageSize: ${{ parameters.storageSize }}
          memoryLimit: ${{ parameters.memoryLimit }}
          cpuLimit: ${{ parameters.cpuLimit }}

    - id: commit
      action: github:repo:push
      input:
        repoUrl: ${{ parameters.gitopsRepoUrl }}
        commitMessage: "Add Redis ${{ parameters.componentId }}"
        path: ./gitops