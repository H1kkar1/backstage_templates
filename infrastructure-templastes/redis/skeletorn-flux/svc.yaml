apiVersion: v1
kind: Service
metadata:
  name: ${{ parameters.componentId }}
  namespace: ${{ parameters.namespace }}
  labels:
    app: ${{ parameters.componentId }}
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app: ${{ parameters.componentId }}