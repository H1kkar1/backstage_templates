apiVersion: v1
kind: Service
metadata:
  name: ${{ parameters.componentId }}
  namespace: ${{ parameters.namespace }}
spec:
  type: ClusterIP
  ports:
  - port: 5672
    targetPort: 5672
    protocol: TCP
    name: amqp
  - port: 15672
    targetPort: 15672
    protocol: TCP
    name: management
  selector:
    app: ${{ parameters.componentId }}